# Server-side validation for this Flywheel-managed GitOps repo.
#
# Local pre-commit hooks are bypassable (`git commit --no-verify`, or never
# running `pre-commit install`) and don't run on a server-side merge. This
# workflow re-runs the same checks on every PR (and on pushes to the
# integration branch) so they can't be skipped, and adds render + schema
# validation that pre-commit doesn't cover:
#
#   lint            — a full-history gitleaks secret scan, plus
#                     `pre-commit run --all-files` (yamllint, the SOPS-shape
#                     guard, and the local-only app guard). This supersedes the
#                     standalone local-only-guard workflow.
#   kustomize-build — `kustomize build` on every `*/overlays/<env>` entrypoint;
#                     catches broken refs, missing files, and bad patches.
#   kubeconform     — strict schema validation of the rendered manifests,
#                     including Flux/cert-manager/CNPG CRDs via the datreeio
#                     community catalog.
#
# To make these non-bypassable, mark the three jobs as required status checks
# on your integration branch (Settings → Branches → branch protection).
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# One source of truth for the validation tool versions. Bump here and both the
# kustomize-build and kubeconform jobs pick it up. Keep gitleaks in step with
# the pin in .pre-commit-config.yaml so CI and local commits scan identically.
env:
  KUSTOMIZE_VERSION: "5.8.1"
  KUBECONFORM_VERSION: "0.8.0"
  GITLEAKS_VERSION: "8.30.1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 pulls the full history so the gitleaks scan below can see
      # every commit, not just the PR's tip — a secret introduced (and later
      # removed) deeper in history still gets caught.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      # The SOPS-shape and local-only guards are `language: system` hooks that
      # shell out to mikefarah `yq`; install it before pre-commit runs.
      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Install gitleaks
        run: |
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
      # The pre-commit gitleaks hook only scans *staged* changes
      # (`gitleaks git --staged`), which is empty on a server-side run — so it
      # can't catch a secret buried in history. Scan the whole repo history here
      # instead. gitleaks auto-discovers .gitleaks.toml (which allowlists the
      # committed clusters/local/age.key and SOPS ciphertext).
      - name: Scan full git history for secrets
        run: gitleaks git --redact --verbose .
      # GITHUB_BASE_REF (a PR's target branch) is set automatically on
      # pull_request events; the local-only guard keys off it to know when to
      # block. No extra wiring needed here.
      - uses: pre-commit/action@v3.0.1

  kustomize-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize
        run: |
          curl -fsSL -o kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar -xzf kustomize.tar.gz
          sudo install -m 0755 kustomize /usr/local/bin/kustomize
      # Discover every overlay entrypoint so coverage grows as you add
      # environments (e.g. a future apps/overlays/prod) — nothing to update here.
      - name: Build all overlays
        run: |
          set -euo pipefail
          shopt -s nullglob
          found=0
          for k in */overlays/*/kustomization.yaml; do
            dir="$(dirname "$k")"
            echo "== kustomize build $dir =="
            kustomize build "$dir"
            found=1
          done
          if [ "$found" -eq 0 ]; then
            echo "no overlays found under */overlays/* — nothing to build"
          fi

  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize + kubeconform
        run: |
          curl -fsSL -o kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar -xzf kustomize.tar.gz
          sudo install -m 0755 kustomize /usr/local/bin/kustomize
          curl -fsSL -o kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf kubeconform.tar.gz
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform
      # -skip Secret: SOPS-encrypted `kind: Secret` carries a `sops:` block that
      #   -strict rejects as an additional property; the SOPS-shape guard
      #   already enforces that plaintext Secrets never land in git.
      # -schema-location: the datreeio community catalog schema-checks Flux
      #   (HelmRelease, Kustomization, GitRepository, …), cert-manager, and CNPG
      #   CRDs instead of skipping them.
      # -ignore-missing-schemas: backstop for any CRD in neither catalog.
      - name: Validate rendered manifests
        run: |
          set -euo pipefail
          shopt -s nullglob
          catalog="https://raw.githubusercontent.com/datreeio/CRDs-catalog/main"
          schema="${catalog}/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json"
          for k in */overlays/*/kustomization.yaml; do
            dir="$(dirname "$k")"
            echo "== kubeconform $dir =="
            kustomize build "$dir" \
              | kubeconform -strict -ignore-missing-schemas -skip Secret -summary \
                  -schema-location default \
                  -schema-location "$schema"
          done
