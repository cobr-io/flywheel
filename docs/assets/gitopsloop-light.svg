    <text x="126" y="472.0" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="16.5" font-weight="650" fill="#10141A" letter-spacing="-0.2">kustomize-controller</text>
    <text x="126" y="496.0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="13.5" fill="#586172">applies your infra/ builders/ apps/ overlays,</text>
