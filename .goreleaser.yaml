# goreleaser config for Flywheel.
#
# - One static Go binary (flywheel) for darwin/linux × amd64/arm64.
# - Three multi-arch container images (git-server, git-auto-sync,
#   image-builder-controller) published to ghcr.io/cobr-io.
# - No :latest tag (per design § Versioning) — every published artefact
#   carries the immutable :vX.Y.Z tag only.
#
# Triggered by `git tag vX.Y.Z && git push --tags` via
# .github/workflows/release.yml.

version: 2

project_name: flywheel

before:
  hooks:
    - go mod tidy

builds:
  - id: flywheel
    main: ./cmd/flywheel
    binary: flywheel
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}

archives:
  - id: flywheel
    ids:
      - flywheel
    name_template: "flywheel_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE*
      - README.md

# Multi-arch container images for the three runtime components.
# Dockerfiles are at the repo root.
dockers:
  - id: git-server-amd64
    image_templates:
      - "ghcr.io/cobr-io/git-server:{{ .Version }}-amd64"
    dockerfile: Dockerfile.git-server
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/cobr-io/flywheel"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    extra_files:
      - scripts/git-server
  - id: git-server-arm64
    image_templates:
      - "ghcr.io/cobr-io/git-server:{{ .Version }}-arm64"
    dockerfile: Dockerfile.git-server
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/cobr-io/flywheel"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    goarch: arm64
    extra_files:
      - scripts/git-server

  - id: git-auto-sync-amd64
    image_templates:
      - "ghcr.io/cobr-io/git-auto-sync:{{ .Version }}-amd64"
    dockerfile: Dockerfile.git-auto-sync
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/cobr-io/flywheel"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    extra_files:
      - scripts/git-auto-sync
  - id: git-auto-sync-arm64
    image_templates:
      - "ghcr.io/cobr-io/git-auto-sync:{{ .Version }}-arm64"
    dockerfile: Dockerfile.git-auto-sync
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/cobr-io/flywheel"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    goarch: arm64
    extra_files:
      - scripts/git-auto-sync

  - id: image-builder-controller-amd64
    image_templates:
      - "ghcr.io/cobr-io/image-builder-controller:{{ .Version }}-amd64"
    dockerfile: Dockerfile.image-builder-controller
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/cobr-io/flywheel"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    extra_files:
      - cmd
      - internal
      - go.mod
      - go.sum
  - id: image-builder-controller-arm64
    image_templates:
      - "ghcr.io/cobr-io/image-builder-controller:{{ .Version }}-arm64"
    dockerfile: Dockerfile.image-builder-controller
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/cobr-io/flywheel"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    goarch: arm64
    extra_files:
      - cmd
      - internal
      - go.mod
      - go.sum

docker_manifests:
  - name_template: "ghcr.io/cobr-io/git-server:{{ .Version }}"
    image_templates:
      - "ghcr.io/cobr-io/git-server:{{ .Version }}-amd64"
      - "ghcr.io/cobr-io/git-server:{{ .Version }}-arm64"
  - name_template: "ghcr.io/cobr-io/git-auto-sync:{{ .Version }}"
    image_templates:
      - "ghcr.io/cobr-io/git-auto-sync:{{ .Version }}-amd64"
      - "ghcr.io/cobr-io/git-auto-sync:{{ .Version }}-arm64"
  - name_template: "ghcr.io/cobr-io/image-builder-controller:{{ .Version }}"
    image_templates:
      - "ghcr.io/cobr-io/image-builder-controller:{{ .Version }}-amd64"
      - "ghcr.io/cobr-io/image-builder-controller:{{ .Version }}-arm64"

# No :latest — design § Versioning makes flywheel.yaml the source of truth.
release:
  github:
    owner: cobr-io
    name: flywheel
  draft: false
  prerelease: auto

changelog:
  use: github-native
  sort: asc
