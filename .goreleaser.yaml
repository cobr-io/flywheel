# goreleaser config for Flywheel.
#
# - One static Go binary (flywheel) for darwin/linux × amd64/arm64.
# - Four multi-arch container images (git-server, git-auto-sync,
#   image-builder-controller, git-deploy-controller) published to ghcr.io/cobr-io.
# - No :latest tag (per design § Versioning) — every published artefact
#   carries the immutable :vX.Y.Z tag only.
#
# Triggered by `git tag vX.Y.Z && git push --tags` via
# .github/workflows/release.yml.

version: 2

project_name: flywheel

before:
  hooks:
    - go mod tidy

builds:
  - id: flywheel
    main: ./cmd/flywheel
    binary: flywheel
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      # Stamp the same symbol the Makefile does (github.com/cobr-io/flywheel.BuildVersion);
      # `main.version`/`main.commit` are no-ops — the main package has no such vars,
      # so a released binary would otherwise report the default v0.0.0-dev.
      # Use {{.Tag}} (e.g. v1.2.3), not {{.Version}} (which strips the leading v →
      # 1.2.3): the up drift gate validates this via golang.org/x/mod/semver, whose
      # IsValid requires the leading v. A v-less stamp fails isReleaseVersion and
      # leaves the gate permanently dormant — matching the Makefile's git-describe.
      - -s -w -X github.com/cobr-io/flywheel.BuildVersion={{.Tag}}

  # Controller binaries, cross-compiled natively on the host (fast) instead of
  # inside the image under QEMU (issue #46). These are NOT archived (see
  # archives.ids below) — they exist only to be COPY'd into the controller
  # runtime images. Flags mirror the old in-image `go build` exactly
  # (CGO_ENABLED=0, GOOS=linux, -trimpath, -s -w) so runtime behavior is
  # unchanged; each docker entry selects its binary via `ids:`.
  - id: image-builder-controller
    main: ./cmd/image-builder-controller
    binary: image-builder-controller
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
  - id: git-deploy-controller
    main: ./cmd/git-deploy-controller
    binary: git-deploy-controller
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: flywheel
    ids:
      - flywheel
    name_template: "flywheel_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE*
      - README.md

# Multi-arch container images for the four runtime components.
# Dockerfiles are at the repo root. Image tags use {{ .Tag }} (e.g. v0.1.0),
# NOT {{ .Version }} (0.1.0): `flywheel up` pulls the released ref
# ghcr.io/cobr-io/<name>:<flywheel.version>, and flywheel.version keeps the
# leading v (init pins it from BuildVersion={{.Tag}}). A v-less image tag here
# 404s every runtime image pull at `up` step 9.
dockers:
  - id: git-server-amd64
    image_templates:
      - "ghcr.io/cobr-io/git-server:{{ .Tag }}-amd64"
    dockerfile: Dockerfile.git-server
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/cobr-io/flywheel"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    extra_files:
      - scripts/git-server
  - id: git-server-arm64
    image_templates:
      - "ghcr.io/cobr-io/git-server:{{ .Tag }}-arm64"
    dockerfile: Dockerfile.git-server
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/cobr-io/flywheel"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    goarch: arm64
    extra_files:
      - scripts/git-server

  - id: git-auto-sync-amd64
    image_templates:
      - "ghcr.io/cobr-io/git-auto-sync:{{ .Tag }}-amd64"
    dockerfile: Dockerfile.git-auto-sync
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/cobr-io/flywheel"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    extra_files:
      - scripts/git-auto-sync
  - id: git-auto-sync-arm64
    image_templates:
      - "ghcr.io/cobr-io/git-auto-sync:{{ .Tag }}-arm64"
    dockerfile: Dockerfile.git-auto-sync
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/cobr-io/flywheel"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    goarch: arm64
    extra_files:
      - scripts/git-auto-sync

  - id: image-builder-controller-amd64
    image_templates:
      - "ghcr.io/cobr-io/image-builder-controller:{{ .Tag }}-amd64"
    dockerfile: Dockerfile.image-builder-controller
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/cobr-io/flywheel"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    # COPY the host-built binary (see the image-builder-controller build) into
    # the context instead of building Go in-image under QEMU (issue #46).
    ids:
      - image-builder-controller
  - id: image-builder-controller-arm64
    image_templates:
      - "ghcr.io/cobr-io/image-builder-controller:{{ .Tag }}-arm64"
    dockerfile: Dockerfile.image-builder-controller
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/cobr-io/flywheel"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    goarch: arm64
    ids:
      - image-builder-controller
  - id: git-deploy-controller-amd64
    image_templates:
      - "ghcr.io/cobr-io/git-deploy-controller:{{ .Tag }}-amd64"
    dockerfile: Dockerfile.git-deploy-controller
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/cobr-io/flywheel"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    # COPY the host-built binary (see the git-deploy-controller build) into the
    # context instead of building Go in-image under QEMU (issue #46).
    ids:
      - git-deploy-controller
  - id: git-deploy-controller-arm64
    image_templates:
      - "ghcr.io/cobr-io/git-deploy-controller:{{ .Tag }}-arm64"
    dockerfile: Dockerfile.git-deploy-controller
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/cobr-io/flywheel"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    goarch: arm64
    ids:
      - git-deploy-controller

docker_manifests:
  - name_template: "ghcr.io/cobr-io/git-server:{{ .Tag }}"
    image_templates:
      - "ghcr.io/cobr-io/git-server:{{ .Tag }}-amd64"
      - "ghcr.io/cobr-io/git-server:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/cobr-io/git-auto-sync:{{ .Tag }}"
    image_templates:
      - "ghcr.io/cobr-io/git-auto-sync:{{ .Tag }}-amd64"
      - "ghcr.io/cobr-io/git-auto-sync:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/cobr-io/image-builder-controller:{{ .Tag }}"
    image_templates:
      - "ghcr.io/cobr-io/image-builder-controller:{{ .Tag }}-amd64"
      - "ghcr.io/cobr-io/image-builder-controller:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/cobr-io/git-deploy-controller:{{ .Tag }}"
    image_templates:
      - "ghcr.io/cobr-io/git-deploy-controller:{{ .Tag }}-amd64"
      - "ghcr.io/cobr-io/git-deploy-controller:{{ .Tag }}-arm64"

# No :latest — design § Versioning makes flywheel.yaml the source of truth.
release:
  github:
    owner: cobr-io
    name: flywheel
  draft: false
  prerelease: auto

changelog:
  use: github-native
  sort: asc
