---
# Single ImageUpdateAutomation for the client repo. Each per-app builder
# folder adds its own ImageRepository + ImagePolicy; the IUA scans the
# policy set and commits bumps to the bare repo over HTTP (the in-cluster
# git-server accepts anonymous pushes for cluster-internal clients).
#
# The bumps land on the DEPLOY branch (flywheel/local-deploy) and stay there:
# git-deploy-controller keeps DEPLOY = AUTHORED + these bumps, but never pulls
# them into the developer's worktree, so the authored branch is never polluted.
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: flywheel-self
  namespace: flux-system
spec:
  interval: 5s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  git:
    # No checkout.ref / push.branch: the IUA commits to the GitRepository's
    # tracked branch, which is the constant DEPLOY branch (flywheel/local-deploy).
    # So image bumps always land on DEPLOY, never on the developer's AUTHORED
    # branch. (Must stay a refs/heads/ branch — a non-head ref fails to fetch on
    # the pinned Flux; see the deploy-ref design.)
    commit:
      author:
        name: image-automation
        email: image-automation@dev.local
      messageTemplate: |
        chore: bump images
        {{ range .Changed.Changes -}}
        - {{ .OldValue }} -> {{ .NewValue }}
        {{ end -}}
  update:
    strategy: Setters
    path: ./
