apiVersion: apps/v1
kind: Deployment
metadata:
  name: git-deploy-controller
  namespace: flywheel-system
  labels:
    app: git-deploy-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: git-deploy-controller
  template:
    metadata:
      labels:
        app: git-deploy-controller
    spec:
      # Reuses the git-auto-sync SA, whose flux-system Role already grants
      # get/patch on gitrepositories, imageupdateautomations, and kustomizations
      # — exactly what this controller needs (ConfigMap reads are kubelet-
      # resolved via valueFrom, so no extra RBAC).
      serviceAccountName: git-auto-sync
      containers:
        - name: controller
          # Tag is a placeholder: rewritten to the per-client local-registry
          # ref by `flywheel up` (renderDevLoopKustomization, keyed on
          # schema.ImageNames) and by the flywheel-dev-loop Kustomization's
          # spec.images on the Flux path — both match by image NAME, so this
          # should never reach the cluster. If it does, the rewrite didn't
          # run — fail loudly instead of silently running a stale pin.
          image: ghcr.io/cobr-io/git-deploy-controller:rewritten-by-flywheel-up
          imagePullPolicy: IfNotPresent
          env:
            # dev-loop/base is static, so per-repo values arrive via flywheel-config.
            - name: REPO_BASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: flywheel-config
                  key: repo.base_name
            # AUTHORED fallback when `flywheel use` hasn't selected a branch.
            - name: DEFAULT_BRANCH
              valueFrom:
                configMapKeyRef:
                  name: flywheel-config
                  key: git.integration_branch
            - name: DEPLOY_WORKDIR
              value: /var/lib/git-deploy/clone
          ports:
            - containerPort: 8081
              name: health
          # Liveness = process up (the HTTP server answers regardless of loop
          # state — a hung git/Flux call must not trigger a restart into the
          # same stuck state). Readiness = the loop's last tick attempt
          # completed within readinessWindow polls (health.go); it flips false
          # on a stall without killing the process. See cmd/git-deploy-controller.
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: workspaces
              mountPath: /workspaces
            - name: workdir
              mountPath: /var/lib/git-deploy
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        # The developer's gitops worktree, bind-mounted into k3d at /workspaces.
        - name: workspaces
          hostPath:
            path: /workspaces
            type: Directory
        # Disposable working clone for the DEPLOY-branch maintainer.
        - name: workdir
          emptyDir: {}
