---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-builder-controller
  namespace: flywheel-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: image-builder-controller
rules:
  - apiGroups: [source.toolkit.fluxcd.io]
    # `delete` is required to clean up orphan GitRepositories that
    # outlive their build-config ConfigMap. git-auto-sync imperatively
    # annotates each per-app GitRepository with
    # `kustomize.toolkit.fluxcd.io/reconcile: disabled` (to win the
    # branch-field race in Open Issue #11), which also blocks Flux's
    # prune — so when the user removes `builders/base/<name>/` and Flux
    # prunes the ConfigMap, the GitRepository is stranded. This
    # controller's Reconcile detects that and deletes the GR directly.
    # `patch` lets IUASourcePokeReconciler bump the gitops GitRepository's
    # reconcile-request annotation the instant the IUA pushes an image bump,
    # collapsing the source-poll wait at the tail of the commit-to-pod loop.
    resources: [gitrepositories]
    verbs: [get, list, watch, patch, delete]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, watch, create, delete]
  # BuildJobReconciler watches build Pods (not the Job) so it can poke the
  # image scan the instant the build container exits 0 — ~4s before the Job
  # is marked Complete. Read-only.
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  # Poke the per-app ImageRepository to scan the registry immediately after a
  # build Job succeeds (reconcile.fluxcd.io/requestedAt), collapsing the
  # image-scan poll wait out of the commit-to-pod loop (BuildJobReconciler).
  - apiGroups: [image.toolkit.fluxcd.io]
    resources: [imagerepositories]
    verbs: [get, list, watch, patch, update]
  # ImagePolicyIUAReconciler watches ImagePolicy status and pokes the
  # ImageUpdateAutomation the instant a policy resolves a new latest tag,
  # collapsing the IUA poll wait out of the commit-to-pod loop.
  - apiGroups: [image.toolkit.fluxcd.io]
    resources: [imagepolicies]
    verbs: [get, list, watch]
  # get/patch: ImagePolicyIUAReconciler pokes the IUA. list/watch:
  # IUASourcePokeReconciler watches the IUA for status.lastPushCommit changes.
  - apiGroups: [image.toolkit.fluxcd.io]
    resources: [imageupdateautomations]
    verbs: [get, list, watch, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: image-builder-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: image-builder-controller
subjects:
  - kind: ServiceAccount
    name: image-builder-controller
    namespace: flywheel-system
---
# Build secrets (BuildSecret/`--secret`) live only in flywheel-system, so a
# namespaced Role is strictly tighter than a cluster-wide get on all Secrets.
# `get` only: the controller reads a referenced Secret/key during build
# validation (fail-closed on missing/empty). The Pod mount itself is performed
# by the kubelet and needs no controller RBAC.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: image-builder-controller-secrets
  namespace: flywheel-system
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: image-builder-controller-secrets
  namespace: flywheel-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: image-builder-controller-secrets
subjects:
  - kind: ServiceAccount
    name: image-builder-controller
    namespace: flywheel-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: git-auto-sync
  namespace: flywheel-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: git-auto-sync
  namespace: flywheel-system
rules:
  # get/patch: the controller (internal/appsync.Ticker/FluxPatcher) patches
  # spec.ref.branch on a branch-follow and pokes
  # reconcile.fluxcd.io/requestedAt after a head-changing sync — same as the
  # bash sidecar it replaces. list/watch: the manager's Reconciler is set up
  # with `.For(&sourcev1.GitRepository{})` (cmd/git-auto-sync), so it LISTs +
  # WATCHes every per-app GitRepository in this namespace to discover apps,
  # rather than being told about one Deployment's app via env vars.
  - apiGroups: [source.toolkit.fluxcd.io]
    resources: [gitrepositories]
    verbs: [get, list, watch, patch]
  # The legacy-sidecar interlock (Reconciler.Reconcile) GETs
  # git-auto-sync-<app> to detect a not-yet-migrated client repo and skip that
  # app. get is the only verb the code calls, but the manager's client reads
  # through the informer cache by default, so list/watch are required for
  # that cache to sync — same shape as image-builder-controller's configmaps
  # rule.
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: git-auto-sync
  namespace: flywheel-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: git-auto-sync
subjects:
  - kind: ServiceAccount
    name: git-auto-sync
    namespace: flywheel-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: git-auto-sync-flux-system
  namespace: flux-system
rules:
  - apiGroups: [source.toolkit.fluxcd.io]
    resources: [gitrepositories]
    verbs: [get, patch]
  # git-deploy-controller (internal/selfsync; the former gitops/self sync.sh
  # mode moved here) suspends + resumes the flywheel-self ImageUpdateAutomation
  # around DEPLOY-branch rebuilds (Open Issue #11), reusing this SA (see
  # git-deploy-controller.yaml).
  - apiGroups: [image.toolkit.fluxcd.io]
    resources: [imageupdateautomations]
    verbs: [get, patch]
  # ...and pokes the apps Kustomization to reconcile immediately after a
  # head-changing sync (reconcile.fluxcd.io/requestedAt). Only
  # git-deploy-controller does this — the git-auto-sync controller
  # (internal/appsync) has no Kustomization poke, same as the sync.sh sidecar
  # it replaces (design: "Out of scope") — but the Role is shared, and the
  # apps Kustomization lives in flux-system.
  - apiGroups: [kustomize.toolkit.fluxcd.io]
    resources: [kustomizations]
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: git-auto-sync-flux-system
  namespace: flux-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: git-auto-sync-flux-system
subjects:
  - kind: ServiceAccount
    name: git-auto-sync
    namespace: flywheel-system
# The single git-auto-sync Deployment (manifests/dev-loop/base/git-auto-sync.yaml)
# runs in flywheel-system (flywheel infra, alongside git-deploy-controller and
# formerly git-auto-sync-self) using the flywheel-system git-auto-sync
# ServiceAccount + Role declared above. It replaces what used to be one
# per-app sidecar Deployment per app (manifests/per-app-template/git-auto-sync.yaml.tmpl,
# deleted) with one controller that LISTs/WATCHes every per-app GitRepository —
# which also lives in flywheel-system (builder infra) — so that same
# flywheel-system Role already authorises the branch-switch patch for every
# app; no apps-namespace or per-app RBAC is needed.
