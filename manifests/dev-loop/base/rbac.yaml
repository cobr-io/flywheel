---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-builder-controller
  namespace: flywheel-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: image-builder-controller
rules:
  - apiGroups: [source.toolkit.fluxcd.io]
    # `delete` is required to clean up orphan GitRepositories that
    # outlive their build-config ConfigMap. git-auto-sync imperatively
    # annotates each per-app GitRepository with
    # `kustomize.toolkit.fluxcd.io/reconcile: disabled` (to win the
    # branch-field race in Open Issue #11), which also blocks Flux's
    # prune — so when the user removes `builders/base/<name>/` and Flux
    # prunes the ConfigMap, the GitRepository is stranded. This
    # controller's Reconcile detects that and deletes the GR directly.
    # `patch` lets IUASourcePokeReconciler bump the gitops GitRepository's
    # reconcile-request annotation the instant the IUA pushes an image bump,
    # collapsing the source-poll wait at the tail of the commit-to-pod loop.
    resources: [gitrepositories]
    verbs: [get, list, watch, patch, delete]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, watch, create, delete]
  # BuildJobReconciler watches build Pods (not the Job) so it can poke the
  # image scan the instant the build container exits 0 — ~4s before the Job
  # is marked Complete. Read-only.
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  # Poke the per-app ImageRepository to scan the registry immediately after a
  # build Job succeeds (reconcile.fluxcd.io/requestedAt), collapsing the
  # image-scan poll wait out of the commit-to-pod loop (BuildJobReconciler).
  - apiGroups: [image.toolkit.fluxcd.io]
    resources: [imagerepositories]
    verbs: [get, list, watch, patch, update]
  # ImagePolicyIUAReconciler watches ImagePolicy status and pokes the
  # ImageUpdateAutomation the instant a policy resolves a new latest tag,
  # collapsing the IUA poll wait out of the commit-to-pod loop.
  - apiGroups: [image.toolkit.fluxcd.io]
    resources: [imagepolicies]
    verbs: [get, list, watch]
  # get/patch: ImagePolicyIUAReconciler pokes the IUA. list/watch:
  # IUASourcePokeReconciler watches the IUA for status.lastPushCommit changes.
  - apiGroups: [image.toolkit.fluxcd.io]
    resources: [imageupdateautomations]
    verbs: [get, list, watch, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: image-builder-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: image-builder-controller
subjects:
  - kind: ServiceAccount
    name: image-builder-controller
    namespace: flywheel-system
---
# Build secrets (BuildSecret/`--secret`) live only in flywheel-system, so a
# namespaced Role is strictly tighter than a cluster-wide get on all Secrets.
# `get` only: the controller reads a referenced Secret/key during build
# validation (fail-closed on missing/empty). The Pod mount itself is performed
# by the kubelet and needs no controller RBAC.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: image-builder-controller-secrets
  namespace: flywheel-system
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: image-builder-controller-secrets
  namespace: flywheel-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: image-builder-controller-secrets
subjects:
  - kind: ServiceAccount
    name: image-builder-controller
    namespace: flywheel-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: git-auto-sync
  namespace: flywheel-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: git-auto-sync
  namespace: flywheel-system
rules:
  - apiGroups: [source.toolkit.fluxcd.io]
    resources: [gitrepositories]
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: git-auto-sync
  namespace: flywheel-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: git-auto-sync
subjects:
  - kind: ServiceAccount
    name: git-auto-sync
    namespace: flywheel-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: git-auto-sync-flux-system
  namespace: flux-system
rules:
  - apiGroups: [source.toolkit.fluxcd.io]
    resources: [gitrepositories]
    verbs: [get, patch]
  # The gitops/self git-auto-sync suspends + resumes the flywheel-self
  # ImageUpdateAutomation during branch switches (Open Issue #11).
  - apiGroups: [image.toolkit.fluxcd.io]
    resources: [imageupdateautomations]
    verbs: [get, patch]
  # ...and pokes the apps Kustomization to reconcile immediately after a
  # head-changing sync (reconcile.fluxcd.io/requestedAt). Only the self sync
  # sets KUSTOMIZATION_NAME, but the Role is shared, and the apps Kustomization
  # lives in flux-system.
  - apiGroups: [kustomize.toolkit.fluxcd.io]
    resources: [kustomizations]
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: git-auto-sync-flux-system
  namespace: flux-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: git-auto-sync-flux-system
subjects:
  - kind: ServiceAccount
    name: git-auto-sync
    namespace: flywheel-system
# Per-app git-auto-sync Deployments run in flywheel-system (flywheel infra,
# alongside git-auto-sync-self) using the flywheel-system git-auto-sync
# ServiceAccount + Role declared above. Their per-app GitRepository now also
# lives in flywheel-system (builder infra), so that same flywheel-system Role
# already authorises the branch-switch patch — no apps-namespace RBAC is needed.
