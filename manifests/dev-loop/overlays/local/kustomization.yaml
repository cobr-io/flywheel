apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Local-cluster dev-loop overlay. Image references stay at their generic
# ghcr.io/cobr-io/* form here; they are rewritten to the per-client k3d
# registry + pinned version by whoever consumes this overlay:
#   - `flywheel up` step 11a (bootstrap) builds base + a transient image
#     transform from the client's flywheel.yaml.
#   - Flux's flywheel-dev-loop Kustomization applies spec.images with the
#     same registry + tag.
# Keeping the rewrite out of this overlay means both consumers converge
# on identical images instead of one stomping the other.
resources:
  - ../../base
