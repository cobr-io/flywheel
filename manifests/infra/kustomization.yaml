apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Cluster-agnostic Flywheel infra. k3d ships Traefik bundled (Helm-managed
# by k3s); this overlay only adds what k3d doesn't already provide — the
# local TLS wiring (traefik-tls.yaml). Reconciled by the flywheel-infra
# Flux Kustomization straight from the Flywheel mirror.
resources:
  - ./traefik-tls.yaml
