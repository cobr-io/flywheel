name: e2e-full

# Nightly / on-demand full dev-loop e2e (issue #38 / plan T17).
#
# The per-PR `k3d-e2e` job in test.yml runs only scenarios 1 + 5 to stay
# inside a ~25-min budget, so the branch scenarios (2 = app branch, 3 =
# gitops branch, 4 = both branches) are validated LOCALLY but never in the
# per-PR path. This workflow closes that gap by running the FULL scenario set
# (run-all.sh, 1-5) — but it no longer copies the per-PR setup. Both callers
# now delegate to the SAME reusable recipe (e2e-recipe.yml), so the two can
# never drift; the only differences are the scenario selection ("all" here vs
# "1 5" per-PR) and a roomier timeout. It fires nightly and on manual dispatch.
#
# A red nightly used to page no one, so the `alert` job below opens (or
# comments on) a stably-titled GitHub issue on failure.
on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily
  workflow_dispatch: {}   # on-demand full run

permissions:
  contents: read

jobs:
  k3d-e2e-full:
    # Full nightly gate = run-all.sh (scenarios 1-5): core dev loop (1), the
    # branch switches skipped per-PR (2 = app branch, 3 = gitops branch, 4 =
    # both branches), and the orphan-Job reaper (5). (Open Issue #11 also
    # affects scenario 4.) `up` alone is ~9 min on a 2-core runner and run-all
    # adds the three branch scenarios plus their Kaniko rebuilds, so give it a
    # generous budget — no per-PR pressure here.
    uses: ./.github/workflows/e2e-recipe.yml
    with:
      scenarios: "all"
      timeout-minutes: 90
      # 3× fits here: the largest scaled wait (scenario-1's 480s → 24m) stays
      # far under the 90m budget, so a failing wait still times out and dumps
      # diagnostics instead of being cancelled by the job budget.
      timeout-scale: 3

  alert:
    # Page someone when the nightly goes red. Opens a stably-titled issue, or
    # comments on the existing open one instead of spamming a fresh issue each
    # night. Runs only on failure of the e2e job (a cancel is not a failure).
    needs: k3d-e2e-full
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or comment on the nightly-failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TITLE: nightly e2e failure
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          # Find an existing OPEN issue with this exact title (search is fuzzy,
          # so re-filter on an exact title match to avoid matching a lookalike).
          existing=$(gh issue list --state open --search "\"$TITLE\" in:title" \
            --json number,title --jq "map(select(.title == \"$TITLE\")) | .[0].number // empty")
          body="The nightly full e2e run (scenarios: all) failed.

          Run: $RUN_URL

          Triage the failing scenario in that run's logs (dump_diag output is captured there). This issue is comment-appended on each subsequent red nightly; close it once the nightly is green again."
          if [ -n "$existing" ]; then
            echo "commenting on existing issue #$existing"
            gh issue comment "$existing" --body "$body"
          else
            echo "opening a new nightly-failure issue"
            gh issue create --title "$TITLE" --body "$body"
          fi
