name: govulncheck

# Reachability-aware Go vulnerability scan. Unlike Dependabot's advisory
# matching, govulncheck only reports CVEs in code paths the binary actually
# calls (go.mod deps + stdlib), so a red run is almost always actionable.
#
# Scheduled / non-blocking by design: it does NOT gate PRs. A weekly run (plus
# on-demand dispatch) surfaces newly-disclosed vulns; a failed run is the
# signal — GitHub emails repo admins on scheduled-workflow failure.
on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC (aligns with the Dependabot day)
  workflow_dispatch: {}   # manual run after a disclosure / before a release

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
