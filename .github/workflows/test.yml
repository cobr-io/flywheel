name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}   # manual re-runs (e.g. T1.11 flakiness check)

permissions:
  contents: read

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race ./...
      - name: cross-phase invariant — no :latest tags in image refs
        # Dockerfiles are globbed (git ls-files), not enumerated by name, so a
        # fifth Dockerfile.* added later is covered automatically instead of
        # silently going unscanned.
        run: |
          if grep -rE '(image:|--destination=)[^[:space:]]*:latest($|[^[:alnum:]])' \
              --exclude='*_test.go' --exclude-dir=testdata \
              cmd/ internal/ manifests/ templates/ \
              $(git ls-files 'Dockerfile.*') 2>/dev/null; then
            echo "ERROR: :latest tag detected — every published artefact must use :vX.Y.Z"
            exit 1
          fi
      - name: cross-phase invariant — no prod/ scaffolding
        run: |
          if find templates/client-skeleton -type d \( -name 'prod' -o -name 'prod-*' -o -name '*-prod' \) 2>/dev/null | grep -q .; then
            echo "ERROR: prod scaffolding leaked into client-skeleton; deferred to v0.2+"
            exit 1
          fi
      # Portability guards. The native runner is linux/amd64, but Flywheel
      # is developed on macOS and run on Linux/WSL (incl. arm64). These
      # catch the regressions that *are* code-level — formatting drift, CRLF
      # line endings that break the shell scripts running inside containers,
      # and a compile break on any release target — without paying for a 2×
      # Windows runner (WSL2 is a real Linux kernel, so this job proxies it).
      - name: gofmt
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needed; run 'gofmt -w' on:"
            echo "$unformatted"
            exit 1
          fi
      - name: line-ending guard — no CRLF in tracked text
        # `git ls-files --eol` reports the worktree EOL per file; .gitattributes
        # forces LF, so any `w/crlf` (or mixed) means a file slipped through and
        # would break `bash` inside the runtime images with a `\r` error.
        run: |
          if git ls-files --eol | grep -E '\sw/(crlf|mixed)\s'; then
            echo "::error::CRLF/mixed line endings in tracked files — must be LF (see .gitattributes)"
            exit 1
          fi
      - name: cross-build — goreleaser target matrix
        # Mirror .goreleaser.yaml (darwin/linux × amd64/arm64). linux/amd64 is
        # already built by vet/test above; build the other three so a
        # platform-specific compile break (build tags, syscall use) fails CI.
        run: |
          set -euo pipefail
          for target in linux/arm64 darwin/amd64 darwin/arm64; do
            echo "==> building ${target}"
            GOOS="${target%/*}" GOARCH="${target#*/}" go build ./...
          done

  version-stamp:
    # Guards against a repeat of the incident logged at .goreleaser.yaml:35-41:
    # the ldflags symbol github.com/cobr-io/flywheel.BuildVersion is spelled
    # independently in Makefile:11 and .goreleaser.yaml, and `-X` on a
    # misspelled/missing symbol is a silent no-op — not a build failure — so
    # this has shipped v0.0.0-dev releases twice. Builds only the `flywheel`
    # CLI for the runner's host platform via goreleaser snapshot mode (no
    # docker images, no other GOOS/GOARCH) and asserts the stamped version
    # isn't the unstamped default. Independent of k3d-e2e so it stays fast.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # goreleaser needs tag history to compute a version
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: goreleaser snapshot build (host target, flywheel CLI only)
        # Mirrors release.yml's setup action + version pin; args differ
        # (build --snapshot --single-target, not release) so this stays
        # docker-free and builds only the current host's target.
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: build --snapshot --single-target --id flywheel --clean
      - name: assert version stamp is not the unstamped default
        run: |
          set -euo pipefail
          bin="$(find dist -type f -name flywheel | head -1)"
          if [ -z "$bin" ]; then
            echo "::error::no 'flywheel' binary found under dist/ after goreleaser snapshot build"
            exit 1
          fi
          out="$("$bin" version)"
          echo "version output: $out"
          if echo "$out" | grep -q 'v0\.0\.0-dev'; then
            echo "::error::snapshot binary reports v0.0.0-dev — the -X ldflags symbol (github.com/cobr-io/flywheel.BuildVersion, spelled independently in Makefile and .goreleaser.yaml) is broken"
            exit 1
          fi

  k3d-e2e:
    # Per-PR e2e gate: scenarios 1 (core dev loop) + 5 (orphan-Job reaper),
    # run through the shared recipe in e2e-recipe.yml. On a 2-core runner `up`
    # alone takes ~9 min, so the full run-all won't fit the 25-min budget;
    # scenarios 2-4 (branch switches) run nightly via e2e-full.yml instead.
    # (Open Issue #11 also affects scenario 4.) The reusable recipe is the one
    # source of truth this per-PR job and the nightly job now share, so the two
    # can no longer drift.
    #
    # Branch protection: because this delegates to a reusable workflow, the
    # status check is named "k3d-e2e / e2e" (was the bare "k3d-e2e") — update
    # the required-check context after merge.
    uses: ./.github/workflows/e2e-recipe.yml
    with:
      scenarios: "1 5"
      timeout-minutes: 25
