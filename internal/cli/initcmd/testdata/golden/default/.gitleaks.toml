[extend]
useDefault = true

[[allowlists]]
description = "Local-dev age private key, committed on purpose (decrypts clusters/local/* only; every other env's key stays out of git). Scoped to this exact path so a leaked AGE-SECRET-KEY anywhere else still trips the default rule."
paths = [
  '''^clusters/local/age\.key$''',
]

[[allowlists]]
description = "SOPS-encrypted ciphertext blocks (expected — these are what SOPS produces)"
regexes = [
  '''ENC\[AES256_GCM,data:[A-Za-z0-9+/=]+,iv:[A-Za-z0-9+/=]+,tag:[A-Za-z0-9+/=]+,type:[a-z]+\]''',
]
paths = [
  '''.*\.enc\.ya?ml$''',
]

[[allowlists]]
description = "SOPS metadata block (sops:, mac:, lastmodified:, version:, encrypted_regex: keys)"
regexes = [
  '''^\s*(mac|lastmodified|version|encrypted_regex|key_groups|enc):''',
  '''^\s*-\s*(recipient|created_at|enc):''',
]
paths = [
  '''.*\.enc\.ya?ml$''',
]
